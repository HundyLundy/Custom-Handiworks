kind = "web"
previewPath = "/"
title = "Custom Handiworks"
version = "1.0.0"
id = "artifacts/custom-handiworks"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23146

[services.development]
run = "pnpm --filter @workspace/custom-handiworks run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/custom-handiworks", "run", "build" ]
publicDir = "artifacts/custom-handiworks/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23146"
BASE_PATH = "/"
